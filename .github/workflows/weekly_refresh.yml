name: Weekly Labor Market Refresh

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6 AM UTC
  workflow_dispatch:        # Manual trigger from GitHub UI
  push:
    branches: [main]        # Also deploy on every push to main

# Required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 now

jobs:
  # ── Job 1: Refresh BLS data (schedule / manual only) ─────────────────────
  refresh:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run BLS refresh script
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python weekly_refresh.py

      - name: Commit updated data
        run: |
          git config user.name  "UB Labor Market Bot"
          git config user.email "bot@ubalt.edu"
          git add labor_market_data_v3.json
          git diff --staged --quiet || git commit -m "chore: weekly labor market refresh $(date +'%Y-%m-%d')"
          git push

  # ── Job 2: Deploy site to GitHub Pages ───────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [refresh]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create .nojekyll (prevents Jekyll from blocking files)
        run: touch .nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
